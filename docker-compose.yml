# docker-compose for the ophyd-service BACKEND demo.
#
# Four services, all backend-side:
#   ioc                    — caproto mini_beamline simulated IOC on EPICS CA (5064)
#   configuration_service  — device/PV registry, port 8004
#   seed_registry          — one-shot sidecar that POSTs mini_beamline PVs to
#                            configuration_service so direct_control's
#                            registry-validation gate lets reads/writes through
#   direct_control_service — WS/REST device commanding + PV monitoring, port 8003
#
# The frontend container is intentionally NOT defined here — that's the
# frontend team's responsibility. Frontend contributors can add a
# `frontend:` service in a compose override file (docker-compose.override.yml)
# and mount the `./shared-schema` volume read-only if they want to consume
# the OpenAPI schemas the backends publish on startup.
#
# Usage:
#   docker compose up --build     # first time, or after Dockerfile edits
#   docker compose up -d          # detached
#   docker compose logs -f        # follow
#   docker compose down           # stop + remove containers

services:
  ioc:
    build:
      context: ./ioc
    # EPICS gateway clients need beacons/search on 5064/udp. Publish only to the
    # compose network by default; uncomment to expose to the host for
    # `caget`/`caput` from your workstation.
    # ports:
    #   - "5064:5064/tcp"
    #   - "5064:5064/udp"
    #   - "5065:5065/udp"
    healthcheck:
      # No TCP port is bound until a client connects — use a process check instead.
      test: ["CMD-SHELL", "pgrep -f caproto.ioc_examples.mini_beamline > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  configuration_service:
    build:
      context: ./backend/configuration_service
    environment:
      OPHYD_SERVICE_OPENAPI_EXPORT_PATH: "/app/openapi/configuration_service.openapi.json"
      # `empty` starts with zero devices and accepts CRUD population — exactly
      # what the seed_registry sidecar does. `mock` would inject sample
      # devices (det1/sample_x/cam1) we don't want alongside our seeded PVs.
      CONFIG_LOAD_STRATEGY: "empty"
      # Default db_path is /var/lib/bluesky, not writable by the non-root
      # container user. /tmp always is.
      CONFIG_DB_PATH: "/tmp/config_service.db"
    volumes:
      - ./shared-schema:/app/openapi
    ports:
      - "8004:8004"

  # One-shot sidecar: POSTs the mini_beamline PV list to configuration_service
  # so direct_control's registry-validation gate lets reads/writes through.
  # For the demo only; a proper deployment would seed via profile files.
  seed_registry:
    image: curlimages/curl:8.10.1
    entrypoint: ["sh", "/seed/seed-pvs.sh"]
    volumes:
      - ./seed:/seed:ro
    depends_on:
      configuration_service:
        condition: service_healthy
    restart: "no"

  direct_control_service:
    build:
      context: ./backend/direct_control_service
    environment:
      OPHYD_SERVICE_OPENAPI_EXPORT_PATH: /app/openapi/direct_control.openapi.json
      DIRECT_CONTROL_CONFIGURATION_SERVICE_URL: http://configuration_service:8004
      # Skip the coordination check — no EE service running in compose.
      DIRECT_CONTROL_COORDINATION_CHECK_ENABLED: "false"
      # pyepics reads these. Point it at the compose-network IOC; disable
      # auto-addr so it doesn't broadcast on the host network.
      EPICS_CA_ADDR_LIST: ioc
      EPICS_CA_AUTO_ADDR_LIST: "NO"
    volumes:
      - ./shared-schema:/app/openapi
    ports:
      - "8003:8003"
    depends_on:
      configuration_service:
        condition: service_healthy
      ioc:
        condition: service_healthy
      seed_registry:
        condition: service_completed_successfully
